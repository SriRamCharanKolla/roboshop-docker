services:
    catalogue:
        build: 
            dockerfile: Dockerfile
        image: catalogue:1.0.0 
        container_name: catalogue
        depends_on: 
            - mongodb
    mongodb:
        build:
            dockerfile: Dockerfile
        image: mongodb:1.0.0 # docker build -t joindevops/mongodb:1.0.0
        container_name: mongodb

networks:
    default:
        driver: bridge
        name: roboshop
        external: false # if true, you need to create network manually
