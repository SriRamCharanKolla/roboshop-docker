services:
    catalogue:
        build: 
            context: ./catalogue
            dockerfile: Dockerfile
        image: ramcharankola2/catalogue:1.0.0 
        container_name: catalogue
        depends_on: 
            - mongodb
    user: 
        build: ./user # shorthand for dockerfile: Dockerfile, directly went to Dockerfile in user folder then run "docker build -t" with below image name. In backend Docker convert this command into "context & Dockerfile with location"
        image: ramcharankola2/user:1.0.0
        container_name: user
        depends_on:
            - mongodb
            - redis
    cart:
        build: ./cart
        image: ramcharankola2/cart:1.0.0
        container_name: cart
        depends_on:
            - redis
            - catalogue
    shipping:
        build: ./shipping
        image: ramcharankola2/shipping:1.0.0
        container_name: shipping
        depends_on:
         - mysql
         - cart
    payment:
        build: ./payment
        image: ramcharankola2/payment:1.0.0
        container_name: payment
        environment:
            CART_HOST: "cart"
            CART_PORT: "8080"
            USER_HOST: "user"
            USER_PORT: "8080"
            AMQP_HOST: "rabbitmq"
            AMQP_USER: "roboshop"
            AMQP_PASS: "roboshop123"
        depends_on:
            - rabbitmq
            - cart
            - user
    frontend:
        build: ./frontend
        image: ramcharankola2/frontend:1.0.0
        container_name: frontend
        ports:
          - "80:80"
        depends_on:
            - catalogue
            - user
            - cart
            - shipping
            - payment
    mongodb:
        build:
            context: ./mongodb
            dockerfile: Dockerfile # it moves to mongodb directory
        image: ramcharankola2/mongodb:1.0.0 # docker build -t mongodb:1.0.0
        container_name: mongodb
        volumes:
          - mongodb:/data/db
    redis:
        image: redis:7.0
        container_name: redis
        volumes:
          - redis:/data
    mysql:
        build: ./mysql
        image: ramcharankola2/mysql:1.0.0
        container_name: mysql
        volumes:
          - mysql:/var/lib/mysql
    rabbitmq:
        image: rabbitmq:3
        environment: 
            RABBITMQ_DEFAULT_USER: roboshop
            RABBITMQ_DEFAULT_PASS: roboshop123
        container_name: rabbitmq
        volumes:
          - rabbitmq:/var/lib/rabbitmq

networks:
    default:
        driver: bridge
        name: roboshop
        external: false # if true, you need to create network manually

volumes:
  mongodb: # docker volume create mongodb
  redis:
  mysql:
  rabbitmq:
